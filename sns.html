<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1b8cff">
  <meta name="description" content="TYPEDのSNSリンク集です。">
  <title>TYPED Homepage</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./assets/icons/icon-192.png">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="site-header" data-current="sns"></div>

  <main>
    <section class="page-head">
      <p class="eyebrow">Social Links</p>
      <h1>SNS</h1>
      <p class="lead">各SNSの役割を分けて、活動の導線を整理しています。</p>
    </section>

    <section class="section">
      <div class="grid two">
        <!-- href を実際のSNS URLに差し替えてください。 -->
        <a class="card sns-button" href="https://youtube.com/@typed871?si=8SW4Al2kDM1Suink" target="_blank" rel="noopener">
          <span class="sns-icon">YT</span>
          <span><strong>YouTube</strong><br>動画投稿、配信アーカイブ、活動の中心。</span>
        </a>
        <a class="card sns-button" href="https://twitter.com/TYPED22833173" target="_blank" rel="noopener">
          <span class="sns-icon">X</span>
          <span><strong>X</strong><br>短い告知、制作メモ、日常的な更新、その他つぶやき。</span>
        </a>
        <a class="card sns-button" href="http://instagram.com/typed_gallery?…" target="_blank" rel="noopener">
          <span class="sns-icon">Ig</span>
          <span><strong>Instagram</strong><br>日常や動画企画の写真置き場。</span>
        </a>
        <a class="card sns-button" href="https://drive.google.com/drive/folders/1nG0VALLWizz9aZRRnBjRZIv7IjZ9709_?usp=sharing" target="_blank" rel="noopener">
          <span class="sns-icon">GD</span>
          <span><strong>Google Drive</strong><br>公開できるソフトやアプリ集。</span>
        </a>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p><a href="./index.html">TYPED Homepage</a> に戻る</p>
  </footer>

  <script src="./script.js" defer></script>
</body>
</html>
